<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BinGods Admin</title>
  <link rel="icon" type="image/webp" href="exiles_icon.webp">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0b0a; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 24px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    h2 { font-size: 1.1rem; margin: 20px 0 8px; color: #ffd700; }
    h3 { font-size: 0.95rem; color: #ffd700; margin-bottom: 6px; }
    a { color: #ff8c00; }

    .login-box, .admin-box { max-width: 700px; margin: 0 auto; }
    .login-box { margin-top: 80px; text-align: center; }

    input, select, button { font-size: 0.9rem; padding: 8px 12px; border-radius: 4px; border: 1px solid #444; background: #1a1a2e; color: #e0e0e0; }
    input:focus, select:focus { outline: none; border-color: #ffd700; }
    button { cursor: pointer; background: #2040a0; border-color: #2040a0; color: #fff; font-weight: 700; }
    button:hover { background: #3060c0; }
    button.danger { background: #a01020; border-color: #a01020; }
    button.danger:hover { background: #c02030; }

    .form-row { display: flex; gap: 8px; align-items: center; margin: 8px 0; flex-wrap: wrap; }
    .form-row label { min-width: 80px; font-size: 0.85rem; color: #aaa; }

    .completion-list { margin-top: 12px; }
    .completion-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; margin: 3px 0; background: #141420;
      border-radius: 4px; border-left: 3px solid;
      font-size: 0.85rem;
    }
    .completion-item .tile-name { flex: 1; }
    .completion-item .sub-name { color: #ff8c00; margin: 0 8px; font-size: 0.8rem; }
    .completion-item .team-name { color: #aaa; margin: 0 12px; font-size: 0.8rem; }

    .status { margin: 8px 0; padding: 8px; border-radius: 4px; font-size: 0.85rem; }
    .status.success { background: rgba(30, 107, 30, 0.3); color: #6f6; }
    .status.error { background: rgba(160, 16, 32, 0.3); color: #f66; }

    .team-card { background: #141420; border-radius: 6px; padding: 12px; margin: 8px 0; border-left: 4px solid; }
    .team-card input { width: 100%; margin: 4px 0; }
    .team-card .members-input { min-height: 60px; }

    .back-link { display: inline-block; margin-bottom: 16px; font-size: 0.85rem; }
    .user-info { font-size: 0.8rem; color: #888; margin-bottom: 12px; }

    /* Sub-items panel */
    .sub-items-panel {
      margin-top: 12px;
      padding: 12px;
      background: #141420;
      border-radius: 6px;
      border: 1px solid #333;
    }
    .sub-items-panel h3 {
      font-size: 0.95rem;
      color: #ffd700;
      margin-bottom: 8px;
    }
    .sub-team-section {
      margin: 8px 0;
      padding: 8px;
      border-left: 3px solid;
      border-radius: 0 4px 4px 0;
      background: rgba(255,255,255,0.03);
    }
    .sub-team-name {
      font-weight: 700;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }
    .sub-item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 0.85rem;
    }
    .sub-item-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #2040a0;
    }
    .sub-item-row.done { color: #6f6; }
    .sub-item-row:not(.done) { color: #ccc; }
    .sub-item-lms {
      font-size: 0.8rem;
      color: #ff8c00;
      margin-left: 4px;
    }

    /* Counter controls */
    .counter-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
      font-size: 0.82rem;
    }
    .counter-row label {
      min-width: 130px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .counter-btn {
      width: 28px;
      height: 24px;
      padding: 0;
      font-size: 0.8rem;
      line-height: 1;
      text-align: center;
      min-width: 28px;
    }
    .counter-btn.wide {
      width: auto;
      padding: 0 6px;
      font-size: 0.7rem;
    }
    .counter-value {
      font-size: 0.85rem;
      font-weight: 700;
      min-width: 45px;
      text-align: center;
    }
    .counter-input {
      width: 70px;
      padding: 3px 6px;
      font-size: 0.8rem;
      text-align: center;
    }
    .counters-section {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #333;
    }
    .counters-section h4 {
      font-size: 0.8rem;
      color: #ffd700;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<div id="login-section" class="login-box">
  <h1>BinGods Admin</h1>
  <p style="color:#888; margin-bottom:20px;">Login to manage completions and teams</p>
  <div class="form-row" style="justify-content:center;">
    <input type="email" id="login-email" placeholder="Email" style="width:220px;">
    <input type="password" id="login-password" placeholder="Password" style="width:220px;">
    <button id="login-btn">Login</button>
  </div>
  <div id="login-status"></div>
  <p style="margin-top:16px;"><a href="index.html">&larr; Back to board</a></p>
</div>

<div id="admin-section" class="admin-box" style="display:none;">
  <a href="index.html?dev=true" class="back-link">&larr; Back to board</a>
  <h1>BinGods Admin</h1>
  <div id="user-info" class="user-info"></div>
  <button id="logout-btn" style="float:right;margin-top:-30px;" class="danger">Logout</button>

  <!-- Add Completion -->
  <h2>Add Completion</h2>
  <div class="form-row">
    <select id="comp-tile" style="flex:2;"><option value="">Loading tiles...</option></select>
    <select id="comp-team" style="flex:1;"><option value="">Loading teams...</option></select>
    <button id="add-comp-btn">Add</button>
  </div>
  <div id="comp-status"></div>

  <!-- Sub-items panel (shown when tile has sub-items) -->
  <div id="sub-items-panel" class="sub-items-panel" style="display:none;"></div>

  <!-- Current Completions -->
  <h2>Current Completions (<span id="comp-count">0</span>)</h2>
  <div class="form-row">
    <input type="text" id="comp-filter" placeholder="Filter by tile name..." style="flex:1;">
  </div>
  <div id="completion-list" class="completion-list"></div>

  <!-- Teams -->
  <h2>Teams</h2>
  <div id="teams-list"></div>
</div>

<script>
var SUPABASE_URL = 'https://guopmuftxabughhnllol.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_eAo1MmVKKvz_hjsVQgJzfQ_62lCD-pT';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

var allTileNames = [];
var tileSubItems = {};
var tileCounters = {};
var teamsCache = [];
var completionsCache = [];

function fmtVal(val, format) {
  if (format === 'xp' || format === 'gp') {
    if (val >= 1000000) return (val / 1000000).toFixed(1).replace(/\.0$/, '') + 'm';
    if (val >= 1000) return Math.floor(val / 1000) + 'k';
    return '' + val;
  }
  return '' + val;
}

// === Auth ===
document.getElementById('login-btn').addEventListener('click', async function() {
  var email = document.getElementById('login-email').value;
  var password = document.getElementById('login-password').value;
  var status = document.getElementById('login-status');

  var res = await sb.auth.signInWithPassword({ email: email, password: password });
  if (res.error) {
    status.className = 'status error';
    status.textContent = res.error.message;
  } else {
    showAdmin(res.data.user);
  }
});

document.getElementById('logout-btn').addEventListener('click', async function() {
  await sb.auth.signOut();
  document.getElementById('admin-section').style.display = 'none';
  document.getElementById('login-section').style.display = 'block';
});

sb.auth.getSession().then(function(res) {
  if (res.data.session) {
    showAdmin(res.data.session.user);
  }
});

async function showAdmin(user) {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('admin-section').style.display = 'block';
  document.getElementById('user-info').textContent = 'Logged in as ' + user.email;

  await loadSubItems();
  await loadCounters();
  await loadTileNames();
  await loadTeams();
  await loadCompletions();
}

// === Load sub-items map ===
async function loadSubItems() {
  try {
    var resp = await fetch('tile-subitems.json');
    var data = await resp.json();
    tileSubItems = {};
    for (var key in data) {
      if (data[key] && data[key].length > 0) {
        tileSubItems[key] = data[key];
      }
    }
  } catch (e) {
    console.warn('Could not load sub-items:', e);
    tileSubItems = {};
  }
}

// === Load tile counters config ===
async function loadCounters() {
  try {
    var resp = await fetch('tile-counters.json');
    tileCounters = await resp.json();
  } catch (e) {
    console.warn('Could not load tile counters:', e);
    tileCounters = {};
  }
}

// === Load tile names from CSV ===
async function loadTileNames() {
  var resp = await fetch('ThoseExiles 2026 bingo clarifications - TileClarifications.csv');
  var text = await resp.text();
  var parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
  allTileNames = parsed.data
    .filter(function(r) { return r['Tile Name']; })
    .map(function(r) { return r['Tile Name'].trim(); })
    .sort();

  var sel = document.getElementById('comp-tile');
  sel.innerHTML = '<option value="">-- Select tile --</option>';
  allTileNames.forEach(function(name) {
    var suffix = '';
    if (tileSubItems[name]) suffix = ' (' + tileSubItems[name].length + ' items)';
    else if (tileCounters[name]) suffix = ' [counter]';
    var opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name + suffix;
    sel.appendChild(opt);
  });
}

// === Teams ===
async function loadTeams() {
  var res = await sb.from('teams').select('*').order('id');
  teamsCache = res.data || [];

  // Populate team dropdown
  var sel = document.getElementById('comp-team');
  sel.innerHTML = '';
  teamsCache.forEach(function(t) {
    var opt = document.createElement('option');
    opt.value = t.name;
    opt.textContent = t.name;
    sel.appendChild(opt);
  });

  renderTeamCards();
}

function renderTeamCards() {
  var list = document.getElementById('teams-list');
  list.innerHTML = '';

  teamsCache.forEach(function(team) {
    var card = document.createElement('div');
    card.className = 'team-card';
    card.style.borderLeftColor = team.color;

    // Basic fields
    card.innerHTML =
      '<div class="form-row"><label>Name</label><input type="text" value="' + esc(team.name) + '" data-field="name"></div>' +
      '<div class="form-row"><label>Color</label><input type="color" value="' + esc(team.color) + '" data-field="color" style="width:60px;padding:2px;"></div>' +
      '<div class="form-row"><label>Captain</label><input type="text" value="' + esc(team.captain) + '" data-field="captain"></div>' +
      '<div class="form-row"><label>Members</label><textarea class="members-input" data-field="members" style="flex:1;background:#1a1a2e;color:#e0e0e0;border:1px solid #444;border-radius:4px;padding:8px;font-size:0.85rem;">' + (team.members || []).join('\n') + '</textarea></div>';

    // Counters section
    var countersDiv = document.createElement('div');
    countersDiv.className = 'counters-section';
    countersDiv.innerHTML = '<h4>Team Effort Counters</h4>';

    // LMS Points row
    countersDiv.appendChild(buildCounterRow(team, {
      key: '_lms_points',
      label: 'LMS Points',
      target: 50,
      step: 1,
      bigStep: 5,
    }));

    // All tile counters
    var counterKeys = Object.keys(tileCounters);
    counterKeys.forEach(function(tileName) {
      var cfg = tileCounters[tileName];
      countersDiv.appendChild(buildCounterRow(team, cfg));
    });

    card.appendChild(countersDiv);

    // Save button
    var saveRow = document.createElement('div');
    saveRow.className = 'form-row';
    saveRow.style.marginTop = '12px';
    saveRow.innerHTML = '<button class="save-team-btn" data-id="' + team.id + '">Save Team Info</button>';
    card.appendChild(saveRow);

    list.appendChild(card);
  });

  // Save team info handler
  list.querySelectorAll('.save-team-btn').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      var id = parseInt(this.dataset.id);
      var card = this.closest('.team-card');
      var captain = card.querySelector('[data-field="captain"]').value.trim();
      var members = card.querySelector('[data-field="members"]').value.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
      if (captain && members.indexOf(captain) === -1) {
        members.unshift(captain);
      }
      var data = {
        name: card.querySelector('[data-field="name"]').value,
        color: card.querySelector('[data-field="color"]').value,
        captain: captain,
        members: members,
      };
      var res = await sb.from('teams').update(data).eq('id', id);
      if (res.error) { alert('Error: ' + res.error.message); }
      else { await loadTeams(); }
    });
  });
}

function buildCounterRow(team, cfg) {
  var isLms = cfg.key === '_lms_points';
  var currentVal = isLms ? (team.lms_points || 0) : ((team.counters || {})[cfg.key] || 0);
  var isDone = currentVal >= cfg.target;

  var row = document.createElement('div');
  row.className = 'counter-row';

  var label = document.createElement('label');
  label.textContent = cfg.label;
  row.appendChild(label);

  // -bigStep button
  var btnBigMinus = document.createElement('button');
  btnBigMinus.className = 'counter-btn wide';
  btnBigMinus.textContent = '-' + fmtVal(cfg.bigStep, cfg.format);
  btnBigMinus.addEventListener('click', function() { adjustCounter(team, cfg, -cfg.bigStep); });
  row.appendChild(btnBigMinus);

  // -step button
  var btnMinus = document.createElement('button');
  btnMinus.className = 'counter-btn';
  btnMinus.textContent = '-';
  btnMinus.addEventListener('click', function() { adjustCounter(team, cfg, -cfg.step); });
  row.appendChild(btnMinus);

  // Value display
  var valSpan = document.createElement('span');
  valSpan.className = 'counter-value';
  valSpan.dataset.counterKey = cfg.key;
  valSpan.dataset.teamId = team.id;
  valSpan.style.color = isDone ? '#6f6' : '#ff8c00';
  valSpan.textContent = fmtVal(currentVal, cfg.format) + '/' + fmtVal(cfg.target, cfg.format);
  row.appendChild(valSpan);

  // +step button
  var btnPlus = document.createElement('button');
  btnPlus.className = 'counter-btn';
  btnPlus.textContent = '+';
  btnPlus.addEventListener('click', function() { adjustCounter(team, cfg, cfg.step); });
  row.appendChild(btnPlus);

  // +bigStep button
  var btnBigPlus = document.createElement('button');
  btnBigPlus.className = 'counter-btn wide';
  btnBigPlus.textContent = '+' + fmtVal(cfg.bigStep, cfg.format);
  btnBigPlus.addEventListener('click', function() { adjustCounter(team, cfg, cfg.bigStep); });
  row.appendChild(btnBigPlus);

  // Direct input
  var directInput = document.createElement('input');
  directInput.className = 'counter-input';
  directInput.type = 'number';
  directInput.min = '0';
  directInput.placeholder = 'Set';
  directInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var v = parseInt(this.value);
      if (!isNaN(v) && v >= 0) {
        setCounter(team, cfg, v);
        this.value = '';
      }
    }
  });
  row.appendChild(directInput);

  return row;
}

async function adjustCounter(team, cfg, delta) {
  var isLms = cfg.key === '_lms_points';
  var currentVal = isLms ? (team.lms_points || 0) : ((team.counters || {})[cfg.key] || 0);
  var newVal = Math.max(0, currentVal + delta);
  await setCounter(team, cfg, newVal);
}

async function setCounter(team, cfg, newVal) {
  var isLms = cfg.key === '_lms_points';
  var res;

  if (isLms) {
    res = await sb.from('teams').update({ lms_points: newVal }).eq('id', team.id);
    if (!res.error) team.lms_points = newVal;
  } else {
    var counters = Object.assign({}, team.counters || {});
    counters[cfg.key] = newVal;
    res = await sb.from('teams').update({ counters: counters }).eq('id', team.id);
    if (!res.error) team.counters = counters;
  }

  if (res.error) {
    alert('Error: ' + res.error.message);
    return;
  }

  // Update display
  var isDone = newVal >= cfg.target;
  var selector = '[data-counter-key="' + cfg.key + '"][data-team-id="' + team.id + '"]';
  var valEl = document.querySelector(selector);
  if (valEl) {
    valEl.textContent = fmtVal(newVal, cfg.format) + '/' + fmtVal(cfg.target, cfg.format);
    valEl.style.color = isDone ? '#6f6' : '#ff8c00';
  }

  // Refresh sub-items panel if relevant
  updateSubItemsPanel();
}

// === Completions ===
async function loadCompletions() {
  var res = await sb.from('completions').select('*').order('created_at', { ascending: false });
  completionsCache = res.data || [];
  renderCompletions();
  updateSubItemsPanel();
}

function renderCompletions(filter) {
  var list = document.getElementById('completion-list');
  list.innerHTML = '';
  var filtered = completionsCache;
  if (filter) {
    var f = filter.toLowerCase();
    filtered = filtered.filter(function(c) { return c.tile_name.toLowerCase().indexOf(f) !== -1; });
  }

  document.getElementById('comp-count').textContent = completionsCache.length;

  filtered.forEach(function(comp) {
    var team = teamsCache.filter(function(t) { return t.name === comp.team_name; })[0];
    var color = team ? team.color : '#666';

    var item = document.createElement('div');
    item.className = 'completion-item';
    item.style.borderLeftColor = color;
    var subLabel = comp.sub_item ? '<span class="sub-name">[' + esc(comp.sub_item) + ']</span>' : '';
    item.innerHTML =
      '<span class="tile-name">' + esc(comp.tile_name) + '</span>' +
      subLabel +
      '<span class="team-name">' + esc(comp.team_name) + '</span>' +
      '<button class="danger del-comp-btn" data-id="' + comp.id + '" style="padding:4px 8px;font-size:0.75rem;">Remove</button>';
    list.appendChild(item);
  });

  list.querySelectorAll('.del-comp-btn').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      var id = parseInt(this.dataset.id);
      await sb.from('completions').delete().eq('id', id);
      await loadCompletions();
    });
  });
}

document.getElementById('comp-filter').addEventListener('input', function() {
  renderCompletions(this.value);
});

// === Sub-items panel ===
function updateSubItemsPanel() {
  var tileName = document.getElementById('comp-tile').value;
  var panel = document.getElementById('sub-items-panel');

  if (!tileName || !tileSubItems[tileName]) {
    // Also check if it's a counter tile
    if (tileName && tileCounters[tileName]) {
      panel.style.display = 'block';
      panel.innerHTML = '<h3>' + esc(tileName) + ' — Team Effort Counter</h3>';
      var cfg = tileCounters[tileName];
      teamsCache.forEach(function(team) {
        var val = (team.counters || {})[cfg.key] || 0;
        var isDone = val >= cfg.target;
        var section = document.createElement('div');
        section.className = 'sub-team-section';
        section.style.borderLeftColor = team.color;
        section.innerHTML =
          '<div class="sub-team-name" style="color:' + team.color + '">' + esc(team.name) +
          ' — <span style="color:' + (isDone ? '#6f6' : '#ff8c00') + '">' +
          fmtVal(val, cfg.format) + '/' + fmtVal(cfg.target, cfg.format) +
          (isDone ? ' \u2713' : '') + '</span></div>' +
          '<div style="font-size:0.8rem;color:#888;">Use the counter controls in the Teams section below to adjust.</div>';
        panel.appendChild(section);
      });
      return;
    }
    panel.style.display = 'none';
    return;
  }

  var subs = tileSubItems[tileName];
  panel.style.display = 'block';
  panel.innerHTML = '<h3>' + esc(tileName) + ' — Sub-items</h3>';

  teamsCache.forEach(function(team) {
    var section = document.createElement('div');
    section.className = 'sub-team-section';
    section.style.borderLeftColor = team.color;

    var teamComps = completionsCache.filter(function(c) {
      return c.tile_name === tileName && c.team_name === team.name;
    });
    var doneItems = teamComps.map(function(c) { return c.sub_item; });
    var doneCount = 0;
    subs.forEach(function(s) { if (doneItems.indexOf(s) !== -1) doneCount++; });

    var header = document.createElement('div');
    header.className = 'sub-team-name';
    header.style.color = team.color;
    header.textContent = team.name + ' (' + doneCount + '/' + subs.length + ')';
    section.appendChild(header);

    subs.forEach(function(subItem) {
      var done = doneItems.indexOf(subItem) !== -1;
      var row = document.createElement('div');
      row.className = 'sub-item-row' + (done ? ' done' : '');

      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = done;

      if (subItem === '50 LMS Points') {
        var lmsVal = team.lms_points || 0;
        cb.disabled = !done && lmsVal < 50;
        var label = document.createElement('span');
        label.textContent = subItem;
        var lmsInfo = document.createElement('span');
        lmsInfo.className = 'sub-item-lms';
        lmsInfo.textContent = '(' + lmsVal + '/50)';
        if (lmsVal < 50 && !done) lmsInfo.style.color = '#a01020';
        row.appendChild(cb);
        row.appendChild(label);
        row.appendChild(lmsInfo);
      } else {
        var label = document.createElement('span');
        label.textContent = subItem;
        row.appendChild(cb);
        row.appendChild(label);
      }

      cb.addEventListener('change', function() {
        toggleSubItem(tileName, team.name, subItem, this.checked);
      });

      section.appendChild(row);
    });

    panel.appendChild(section);
  });
}

async function toggleSubItem(tileName, teamName, subItem, checked) {
  var status = document.getElementById('comp-status');
  if (checked) {
    var res = await sb.from('completions').insert({ tile_name: tileName, team_name: teamName, sub_item: subItem });
    if (res.error) {
      status.className = 'status error';
      status.textContent = res.error.message;
    } else {
      status.className = 'status success';
      status.textContent = 'Added: ' + subItem + ' for ' + teamName;
    }
  } else {
    var match = completionsCache.filter(function(c) {
      return c.tile_name === tileName && c.team_name === teamName && c.sub_item === subItem;
    })[0];
    if (match) {
      var res = await sb.from('completions').delete().eq('id', match.id);
      if (res.error) {
        status.className = 'status error';
        status.textContent = res.error.message;
      } else {
        status.className = 'status success';
        status.textContent = 'Removed: ' + subItem + ' for ' + teamName;
      }
    }
  }
  await loadCompletions();
  setTimeout(function() { status.textContent = ''; status.className = ''; }, 3000);
}

document.getElementById('comp-tile').addEventListener('change', function() {
  updateSubItemsPanel();
});

// Add completion (for tiles WITHOUT sub-items and NOT counter tiles)
document.getElementById('add-comp-btn').addEventListener('click', async function() {
  var tileName = document.getElementById('comp-tile').value;
  var teamName = document.getElementById('comp-team').value;
  var status = document.getElementById('comp-status');

  if (!tileName || !teamName) {
    status.className = 'status error';
    status.textContent = 'Select both a tile and a team';
    return;
  }

  if (tileSubItems[tileName]) {
    status.className = 'status error';
    status.textContent = 'This tile has sub-items — use the checkboxes below instead';
    return;
  }

  if (tileCounters[tileName]) {
    status.className = 'status error';
    status.textContent = 'This is a counter tile — use the counter controls in the Teams section';
    return;
  }

  var res = await sb.from('completions').insert({ tile_name: tileName, team_name: teamName });
  if (res.error) {
    status.className = 'status error';
    status.textContent = res.error.message.indexOf('duplicate') !== -1
      ? 'Already completed by this team'
      : res.error.message;
  } else {
    status.className = 'status success';
    status.textContent = 'Added: ' + tileName + ' for ' + teamName;
    await loadCompletions();
  }
  setTimeout(function() { status.textContent = ''; status.className = ''; }, 3000);
});

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
</script>
</body>
</html>
